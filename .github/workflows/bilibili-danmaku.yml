name: Bilibili 仅下载弹幕 XML

on:
  workflow_dispatch:
    inputs:
      url:
        description: '番剧链接 (ep/ss)'
        required: true

jobs:
  danmaku:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下载弹幕
        run: |
          mkdir -p downloads
          docker run --rm \
            -v ${{ github.workspace }}/downloads:/downloads \
            siguremo/yutto download \
            "${{ github.event.inputs.url }}" \
            --dir /downloads \
            --danmaku-format xml \
            --danmaku-only

      - name: 显示结果
        run: ls -R downloads

      - name: 下载文件
        uses: actions/upload-artifact@v4
        with:
          name: danmaku-xml
          path: downloads/
          retention-days: 7
