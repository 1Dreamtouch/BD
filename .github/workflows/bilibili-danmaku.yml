name: Bilibili 仅下载弹幕 (XML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '番剧链接 (支持 epxxxx / ssxxxx / 完整网址)'
        required: true
      episodes:
        description: '选集 (默认全季 ^~$)'
        required: false
        default: '^~$'

jobs:
  danmaku:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下载弹幕 (仅 XML)
        run: |
          mkdir -p downloads
          docker run --rm \
            -v ${{ github.workspace }}/downloads:/downloads \
            siguremo/yutto \
            "${{ github.event.inputs.url }}" \
            --dir /downloads \
            --danmaku-format xml \
            --episodes "${{ github.event.inputs.episodes }}" \
            --yes \
            --no-video \           # 只下载弹幕
            --danmaku-only         # 强化只下弹幕

      - name: 显示下载的弹幕文件
        run: ls -R downloads

      - name: 打包下载 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-danmaku-xml
          path: downloads/
          retention-days: 7   # 保留7天
