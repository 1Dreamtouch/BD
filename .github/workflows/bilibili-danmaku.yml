name: bilibili-danmaku-download

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Bilibili ep url"
        required: true
        default: "https://www.bilibili.com/bangumi/play/ep32246"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install yutto
        run: pip install yutto

      - name: Download danmaku
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
        run: |
          mkdir output
          yutto "${{ github.event.inputs.url }}" \
            --danmaku-only \
            --dir output \
            --no-color

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: danmaku
          path: output
