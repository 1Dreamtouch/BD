name: Bilibili 仅下载弹幕 (XML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '番剧链接'
        required: true

jobs:
  danmaku:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 仅下载弹幕 XML
        run: |
          mkdir -p downloads
          docker run --rm \
            -v ${{ github.workspace }}/downloads:/downloads \
            siguremo/yutto \
            download "${{ github.event.inputs.url }}" \
            --dir /downloads \
            --danmaku-format xml \
            --danmaku-only \
            --no-video \
            --episodes ^~$

      - name: 显示下载结果
        run: ls -lhR downloads

      - name: 下载弹幕文件
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-danmaku-xml
          path: downloads/
          retention-days: 7
