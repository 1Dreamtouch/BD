name: Bilibili 仅下载弹幕 (XML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '番剧链接'
        required: true
      episodes:
        description: '选集 (默认全季)'
        required: false
        default: '^~$'

jobs:
  danmaku:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 仅下载弹幕 (XML)
        run: |
          mkdir -p downloads
          docker run --rm \
            -v ${{ github.workspace }}/downloads:/downloads \
            siguremo/yutto \
            download \
            "${{ github.event.inputs.url }}" \
            --dir /downloads \
            --danmaku-format xml \
            --episodes "${{ github.event.inputs.episodes }}" \
            --no-video \
            --danmaku-only

      - name: 显示文件
        run: ls -R downloads

      - name: 下载弹幕文件
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-danmaku-xml
          path: downloads/
          retention-days: 7
