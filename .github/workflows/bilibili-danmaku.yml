name: yutto download

on:
  workflow_dispatch:
    inputs:
      url:
        description: "B站视频URL"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install yutto
        run: |
          pip install -U yutto

      - name: Download video + danmaku
        run: |
          mkdir output
          yutto "${{ github.event.inputs.url }}" -d output

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: yutto-output
          path: output
