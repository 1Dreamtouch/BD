name: Bilibili 番剧弹幕下载 (XML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'B站链接 (支持 SS/EP/MD 号或完整网址)'
        required: true
        default: 'https://www.bilibili.com/bangumi/play/ep'
      episodes:
        description: '选集 (默认全集 ^~$，如 1-5 或 1,3,5)'
        required: false
        default: '^~$'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 下载弹幕 (yutto Docker)
        run: |
          mkdir -p downloads
          docker run --rm \
            -v ${{ github.workspace }}/downloads:/downloads \
            siguremo/yutto \
            "${{ github.event.inputs.url }}" \
            --dir /downloads \
            --danmaku xml \
            --episodes "${{ github.event.inputs.episodes }}" \
            --yes

      - name: 显示下载文件列表
        run: ls -R downloads

      - name: Upload 弹幕文件 (方便下载)
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-danmaku
          path: downloads/
          retention-days: 7
