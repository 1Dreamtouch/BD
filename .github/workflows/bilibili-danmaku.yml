name: bilibili-danmaku-xml-download

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Bilibili URL (ep / ss / md)"
        required: true
        default: "https://www.bilibili.com/bangumi/play/ss1539"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ ffmpeg（yutto 依赖检测）
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # ✅ 安装 yutto
      - name: Install yutto
        run: pip install -U yutto

      # ✅ 下载 XML 弹幕（核心）
      - name: Download danmaku (XML)
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
        run: |
          mkdir -p output

          echo "Downloading: ${{ github.event.inputs.url }}"

          yutto "${{ github.event.inputs.url }}" \
            -b \
            --danmaku-only \
            --danmaku-format xml \
            --dir output \
            --no-color

      # ✅ 上传结果
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: danmaku-xml
          path: output
