name: Bilibili Download with yutto

on:
  workflow_dispatch:  # 手动触发
    inputs:
      url:
        description: 'B站番剧链接 (SS/EP)'
        required: true
      danmaku:
        description: '弹幕格式 (xml/ass/no)'
        default: 'ass'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download with yutto
        run: |
          docker run --rm -v ${{ github.workspace }}/downloads:/app/downloads \
            siguremo/yutto \
            ${{ github.event.inputs.url }} \
            --dir /app/downloads \
            --danmaku ${{ github.event.inputs.danmaku }} \
            --episodes ^~$
